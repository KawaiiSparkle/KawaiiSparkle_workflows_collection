name: Blutter APK Analysis & Release

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'APK 文件下载链接'
        required: true
        type: string
      extra_args:
        description: 'blutter.py 额外参数 (如 --no-analysis --ida-fcn)'
        required: false
        type: string
        default: '--ida-fcn'

permissions:
  contents: write

jobs:
  blutter-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blutter-termux
        uses: actions/checkout@v4
        with:
          repository: dedshit/blutter-termux

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build blutter Docker image
        run: docker build -t blutter:latest .

      - name: Download APK
        run: |
          mkdir -p input output
          wget -O input/app.apk "${{ inputs.apk_url }}"
          echo "APK downloaded: $(ls -lh input/app.apk)"

      - name: Run blutter analysis
        run: |
          docker run --rm \
            -v "$(pwd)/input:/app/input:ro" \
            -v "$(pwd)/output:/app/output" \
            blutter:latest \
            /app/input/app.apk /app/output ${{ inputs.extra_args }}

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Package output (tar.zst)
        run: tar -c -C output . | zstd -T0 -o blutter-output.tar.zst

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: blutter-output.tar.zst
          tag_name: blutter-${{ github.run_id }}-${{ github.run_attempt }}
          name: Blutter Analysis ${{ github.run_id }}
          body: |
            ## Blutter Analysis Result

            - **APK**: `${{ inputs.apk_url }}`
            - **Extra Args**: `${{ inputs.extra_args }}`
            - **Run ID**: ${{ github.run_id }}

            Output files:
            - `asm/` - libapp 汇编及符号
            - `blutter_frida.js` - Frida 脚本模板
            - `objs.txt` - Object Pool 完整转储
            - `pp.txt` - 所有 Dart 对象
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
